name: CD - Ong.Worker

on:
  workflow_run:
    workflows: ["CI - Ong.Worker"]
    branches: [main, master]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ong-worker

jobs:
  docker-build-push:
    name: 🐳 Build & Push da Imagem
    runs-on: ubuntu-latest
    # Só executa se o CI passou
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏷️ Metadados da Imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest
            type=ref,event=branch

      - name: 🚀 Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Ong.Worker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------
  # Deploy — adapte este job ao seu ambiente (K8s, VPS, ECS, etc.)
  # O exemplo abaixo usa SSH para atualizar um docker-compose remoto.
  # ---------------------------------------------------------------
  deploy:
    name: 🚢 Deploy
    runs-on: ubuntu-latest
    needs: docker-build-push
    environment:
      name: production
      url: ${{ secrets.DEPLOY_URL }}

    steps:
      - name: 🔑 Configurar SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 🚀 Atualizar container no servidor
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          COMPOSE_DIR: ${{ secrets.DEPLOY_COMPOSE_DIR }}
        run: |
          ssh -o StrictHostKeyChecking=no "$USER@$HOST" \
            "cd $COMPOSE_DIR && \
             docker compose pull ong-worker && \
             docker compose up -d --no-deps ong-worker && \
             docker image prune -f"

      - name: ✅ Health Check
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
        run: |
          for i in $(seq 1 10); do
            STATUS=$(ssh -o StrictHostKeyChecking=no "$USER@$HOST" \
              "curl -sf http://localhost:8080/health && echo OK || echo FAIL")
            if [ "$STATUS" = "OK" ]; then
              echo "✅ Health check OK"
              exit 0
            fi
            echo "⏳ Tentativa $i/10 — aguardando..."
            sleep 6
          done
          echo "❌ Health check falhou após 60s"
          exit 1
