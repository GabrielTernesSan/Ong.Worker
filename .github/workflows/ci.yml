name: CI - Ong.Worker

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: 🔨 Build & Testes
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Configurar .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: 🗂️ Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: 📦 Restore
        run: dotnet restore Ong.Worker.sln

      - name: 🏗️ Build
        run: dotnet build Ong.Worker.sln --configuration Release --no-restore

      - name: 🧪 Testes com cobertura
        run: |
          dotnet test tests/Ong.Tests/Ong.Tests.csproj \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./test-results \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: 📊 Publicar Resultados dos Testes
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Testes - Ong.Worker
          path: ./test-results/*.trx
          reporter: dotnet-trx
          fail-on-empty: false

